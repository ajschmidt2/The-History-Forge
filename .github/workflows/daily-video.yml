name: Daily History Video

on:
  schedule:
    # 07:00 UTC daily. GitHub Actions schedules are UTC; adjust this cron for your local timezone.
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  generate-daily-video:
    runs-on: ubuntu-latest
    env:
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      VIDEOS_BUCKET: generated-videos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily video job
        run: python -m src.workflow.daily_job
