name: generate-daily-video

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-daily-video:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify required secrets exist
        shell: bash
        run: |
          echo "Checking required secrets..."

          missing=0

          if [ -n "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY detected"
          else
            echo "OPENAI_API_KEY missing"
            missing=1
          fi

          if [ -n "$SUPABASE_URL" ]; then
            echo "SUPABASE_URL detected"
          else
            echo "SUPABASE_URL missing"
            missing=1
          fi

          if [ -n "$SUPABASE_KEY" ]; then
            echo "SUPABASE_KEY detected"
          else
            echo "SUPABASE_KEY missing"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required secrets are missing."
            exit 1
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify OpenAI env vars exist
        run: |
          echo "Checking env vars..."
          if [ -n "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY detected"
          else
            echo "OPENAI_API_KEY missing"
          fi

          if [ -n "$openai_api_key" ]; then
            echo "openai_api_key detected"
          else
            echo "openai_api_key missing"
          fi

      - name: Run daily video job
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m src.workflow.daily_job
